services:
  
  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: unisync_frontend
    ports:
      - "3000:3000" 
    
    environment:
      - REACT_APP_API_url=http://localhost:8000
    restart: unless-stopped
    depends_on:
      - backend

    

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: unisync_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://unisync_user:unisync_password@postgres:5432/unisync_db
      - AI_SERVICE_URL=http://ai-service:5000

    restart: unless-stopped
    depends_on:
      - ai_service


  ai-service:
    build:
      context: ./ai_services
      dockerfile: Dockerfile
    container_name: unisync-ai
    ports:
      - "5000:5000"

    volumes:
      - ./ai_service:/app
      - huggingface_cache:/root/.cache/huggingface_cache
    

      
volumes:
  huggingface_cache:
  
      
      


